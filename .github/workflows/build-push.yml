# =====================================================================
#  Build & Push – Varnish Hardened
#  Multi-stage Dockerfile → ghcr.io + Docker Hub
#  Lint + Build + Sign (cosign OIDC) + Scan (Trivy) + Release
# =====================================================================
name: build-push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'Dockerfile'
      - 'init.go'
      - 'go.mod'
      - 'conf/**'
      - 'scripts/**'
      - '.github/workflows/build-push.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}
  IMAGE_NAME: varnish-hardened

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

jobs:
  # -------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  # -------------------------------------------------------------------
  #  Builds the image once. On a real push/tag (never on pull_request --
  #  fork PRs must not get registry credentials) it's pushed BY DIGEST, so
  #  `test` below can pull back that exact digest and run the functional
  #  tests against those literal bytes -- not a separately-built image that
  #  "should" match thanks to cache. `promote` re-tags/signs/scans that
  #  same digest; nothing gets rebuilt between "tested" and "shipped". On a
  #  PR there's no registry to push to, so the image is instead exported to
  #  a local tarball and handed to `test` (a separate job/runner) as an
  #  artifact.
  # -------------------------------------------------------------------
  build:
    name: Build image
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    env:
      PUBLISH: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login ghcr.io
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Varnish version
        id: versions
        run: |
          set -euo pipefail
          VARNISH_VER=$(jq -r '.varnish' versions.json)
          ALPINE_VER=$(jq -r '.alpine' versions.json)
          echo "varnish=${VARNISH_VER}" >> "$GITHUB_OUTPUT"
          echo "alpine=${ALPINE_VER}" >> "$GITHUB_OUTPUT"

      - name: Make room for local tarball export (PR only)
        if: env.PUBLISH != 'true'
        run: mkdir -p /tmp/image-tar

      - name: Build (push-by-digest, or local tarball on PR)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          outputs: ${{ env.PUBLISH == 'true' && format('type=image,name={0}/{1}/{2},push-by-digest=true,name-canonical=true,push=true', env.REGISTRY, env.NAMESPACE, env.IMAGE_NAME) || 'type=docker,dest=/tmp/image-tar/image.tar' }}
          tags: ${{ env.PUBLISH != 'true' && format('localhost/{0}:latest', env.IMAGE_NAME) || '' }}
          sbom: ${{ env.PUBLISH }}
          provenance: ${{ env.PUBLISH == 'true' && 'mode=max' || 'false' }}
          build-args: |
            VARNISH_VERSION=${{ steps.versions.outputs.varnish }}
            ALPINE_VERSION=${{ steps.versions.outputs.alpine }}
          cache-from: type=gha,scope=varnish
          cache-to: type=gha,mode=max,scope=varnish

      - name: Upload image tarball (PR only, for the test job)
        if: env.PUBLISH != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: image-tar
          path: /tmp/image-tar/image.tar
          if-no-files-found: error
          retention-days: 1

  # -------------------------------------------------------------------
  #  Loads the exact bytes `build` just produced (pulled by digest from
  #  the registry, or loaded from its tarball artifact on a PR) and runs
  #  the functional tests against them.
  # -------------------------------------------------------------------
  test:
    name: Functional tests
    needs: build
    runs-on: ubuntu-latest
    env:
      PUBLISH: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7

      - name: Login ghcr.io
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built digest for testing
        if: env.PUBLISH == 'true'
        run: |
          set -euo pipefail
          docker pull "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
          docker tag  "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}" "localhost/${{ env.IMAGE_NAME }}:latest"

      - name: Download image tarball (PR only)
        if: env.PUBLISH != 'true'
        uses: actions/download-artifact@v8
        with:
          name: image-tar
          path: /tmp/image-tar

      - name: Load image tarball (PR only)
        if: env.PUBLISH != 'true'
        run: docker load -i /tmp/image-tar/image.tar

      - name: Build & start stack
        run: docker compose up -d --no-build varnish

      - name: Wait for healthy
        run: |
          set -euo pipefail
          cid="$(docker compose ps -q varnish)"
          for _ in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "starting")
            [ "$status" = "healthy" ] && exit 0
            sleep 2
          done
          echo "::error::varnish did not become healthy in time"
          docker inspect --format '{{json .State.Health}}' "$cid" || true
          docker compose logs
          exit 1

      - name: Run smoke tests
        run: ./scripts/test.sh 127.0.0.1 8080

      - name: Container logs (on failure)
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down -v

  # -------------------------------------------------------------------
  #  Re-tags the exact digest `build` pushed and `test` just verified --
  #  no rebuild. imagetools create also copies it to Docker Hub when
  #  configured (cross-registry manifest copy, no local pull needed).
  # -------------------------------------------------------------------
  promote:
    name: Promote tested digest
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: dockerhub
        run: |
          if [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login Docker Hub
        if: steps.dockerhub.outputs.available == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Varnish version
        id: versions
        run: |
          set -euo pipefail
          VARNISH_VER=$(jq -r '.varnish' versions.json)
          echo "varnish=${VARNISH_VER}" >> "$GITHUB_OUTPUT"
          echo "### Resolved versions" >> "$GITHUB_STEP_SUMMARY"
          echo "- varnish: ${VARNISH_VER}" >> "$GITHUB_STEP_SUMMARY"

      - name: Compute Docker Hub image name
        id: dockerhub-image
        if: steps.dockerhub.outputs.available == 'true'
        env:
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: echo "image=docker.io/${DOCKERHUB_NS}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
            ${{ steps.dockerhub-image.outputs.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.versions.outputs.varnish }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create tags on the tested digest (no rebuild)
        id: manifest
        run: |
          set -euo pipefail
          SOURCE="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
          TAGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS="${TAGS} -t ${tag}"
          done <<< "${{ steps.meta.outputs.tags }}"
          docker buildx imagetools create ${TAGS} "${SOURCE}"
          DIGEST=$(docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.varnish }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (OIDC keyless)
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
          HAS_DOCKERHUB: ${{ steps.dockerhub.outputs.available }}
          DOCKERHUB_NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          if [ "$HAS_DOCKERHUB" = "true" ]; then
            COSIGN_REPOSITORY="${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}" \
              cosign sign --yes "docker.io/${DOCKERHUB_NS}/${{ env.IMAGE_NAME }}@${DIGEST}"
          fi

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}@${{ steps.manifest.outputs.digest }}
          format: sarif
          output: trivy-varnish.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-varnish.sarif
          category: varnish-hardened

      - name: GitHub SLSA Attestation
        if: "!startsWith(github.ref, 'refs/heads/dependabot/')"
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

  # -------------------------------------------------------------------
  cleanup:
    name: Prune old registry tags
    needs: promote
    uses: ./.github/workflows/registry-cleanup.yml
    secrets: inherit

  # -------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: promote
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Tarball + checksums
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' \
              -czf "dist/varnish-hardened-${VERSION}.tar.gz" \
              --transform "s,^,varnish-hardened-${VERSION}/," \
              $(ls -A | grep -v -E '^(\.git|dist)$')
          cd dist
          sha256sum "varnish-hardened-${VERSION}.tar.gz" > "varnish-hardened-${VERSION}.sha256"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/varnish-hardened-${{ github.ref_name }}.tar.gz
            dist/varnish-hardened-${{ github.ref_name }}.sha256
