# =====================================================================
#  Security Audit – Varnish Hardened
#  Weekly: Trivy + Grype scan → auto-issue on failure
# =====================================================================
name: security-audit

on:
  schedule:
    - cron: '0 3 * * 2'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}
  IMAGE_NAME: varnish-hardened

permissions:
  contents: read
  packages: read
  security-events: write
  issues: write

jobs:
  audit:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy full scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-audit.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'
          ignore-unfixed: false

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-audit.sarif
          category: varnish-audit

      - name: Grype cross-check
        id: grype
        continue-on-error: true
        uses: anchore/scan-action@v5
        with:
          image: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          fail-build: 'true'
          severity-cutoff: high
          only-fixed: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify signature
        id: verify
        continue-on-error: true
        run: |
          cosign verify \
            "${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest" \
            --certificate-identity-regexp '^https://github.com/${{ github.repository }}/' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Create issue on failure
        if: steps.grype.outcome == 'failure' || steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Audit failed – ${new Date().toISOString().slice(0,10)}`,
              body: `Weekly security audit detected issues.\n\nPlease review the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['security']
            });
