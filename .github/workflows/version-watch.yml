# =====================================================================
#  Version Watch – Varnish Hardened
#  Daily cron: detect upstream Varnish updates → auto-rebuild
# =====================================================================
name: version-watch

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: ${{ github.repository_owner }}
  IMAGE_NAME: varnish-hardened

permissions:
  contents: write
  packages: read
  actions: write

jobs:
  check:
    name: Check upstream versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Login ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current and upstream versions
        id: compare
        run: |
          set -euo pipefail

          # Current version from versions.json
          CURRENT=$(jq -r '.varnish' versions.json)
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"

          # Latest stable from GitHub tags (varnishcache/varnish-cache)
          LATEST=$(curl -fsSL "https://api.github.com/repos/varnishcache/varnish-cache/tags?per_page=100" \
            | jq -r '.[].name' \
            | grep -oP '^varnish-\K[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" != "$LATEST" ]; then
            echo "outdated=true" >> "$GITHUB_OUTPUT"
            echo "### Update available" >> "$GITHUB_STEP_SUMMARY"
            echo "- Current: ${CURRENT}" >> "$GITHUB_STEP_SUMMARY"
            echo "- Latest:  ${LATEST}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "outdated=false" >> "$GITHUB_OUTPUT"
            echo "### Up to date (${CURRENT})" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Update versions.json and push
        id: bump
        if: steps.compare.outputs.outdated == 'true'
        env:
          LATEST: ${{ steps.compare.outputs.latest }}
        run: |
          jq --arg v "$LATEST" '.varnish = $v' versions.json > versions.json.tmp
          mv versions.json.tmp versions.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: bump varnish to ${LATEST}"
          git push origin main

          TAG="auto-$(date +%Y%m%d).1"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          echo "### Triggered rebuild" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${TAG}" >> "$GITHUB_STEP_SUMMARY"

      # Creating the tag via `git push`/`git tag` would go through git's
      # pre-receive hook, which refuses any GITHUB_TOKEN push of a
      # brand-new ref whose tree contains .github/workflows/* (even
      # unchanged content already on main) unless the token has
      # `workflows` permission — a permission GITHUB_TOKEN can never be
      # granted. action-gh-release creates the tag via the Releases REST
      # API instead, a separate code path that only needs
      # `contents: write` as long as the tag targets the current branch
      # tip (not an older commit) — same pattern as nginx-hardened.
      - name: Create GitHub Release (auto-tag)
        if: steps.compare.outputs.outdated == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: "Auto-update: Varnish ${{ steps.compare.outputs.latest }}"
          body: |
            ## Automatic rebuild triggered by upstream version change

            Varnish: ${{ steps.compare.outputs.current }} → ${{ steps.compare.outputs.latest }}
          generate_release_notes: false
          prerelease: true

      # A push made with the default GITHUB_TOKEN never fires other
      # `on: push` workflows (GitHub's anti-recursion guard), and the
      # auto-tag above doesn't match build-push's `v*.*.*` tag pattern
      # either — so build-push.yml would otherwise never run after a
      # version bump. An explicit dispatch via the API is not subject
      # to that restriction.
      - name: Trigger build-push
        if: steps.compare.outputs.outdated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run build-push.yml --ref main
