x-common-security: &common-security
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  ulimits:
    nofile: { soft: 65536, hard: 65536 }
  restart: unless-stopped
  logging:
    driver: json-file
    options: { max-size: "50m", max-file: "5" }

services:
  varnish:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/varnish-hardened:latest
    <<: *common-security
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      VARNISH_SIZE: "128M"
      VARNISH_HTTP_PORT: "8080"
      VARNISH_PROXY_PORT: "8443"
    volumes:
      - ./conf/default.vcl:/etc/varnish/default.vcl:ro
    tmpfs:
      - /var/lib/varnish:nodev,nosuid,noexec,size=256m
      - /tmp:nodev,nosuid,noexec,size=16m
