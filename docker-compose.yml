x-common-security: &common-security
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  ulimits:
    nofile: { soft: 65536, hard: 65536 }
  restart: unless-stopped
  logging:
    driver: json-file
    options: { max-size: "50m", max-file: "5" }

services:
  varnish:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/varnish-hardened:latest
    <<: *common-security
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      VARNISH_SIZE: "128M"
      VARNISH_HTTP_PORT: "8080"
      VARNISH_PROXY_PORT: "8443"
    volumes:
      - ./conf/default.vcl:/etc/varnish/default.vcl:ro
    tmpfs:
      # varnishd mmaps an executable VSM (shared memory log) in its working
      # directory (-n) -- noexec here makes it refuse to start outright
      # ("cannot reside on a file system mounted noexec"). mode=1777 is
      # required too: without it the mount defaults to root:root 0755,
      # which the non-root varnish user (uid 6081) can't write into.
      - /var/lib/varnish:nodev,nosuid,exec,size=256m,mode=1777
      - /tmp:nodev,nosuid,noexec,size=16m,mode=1777
